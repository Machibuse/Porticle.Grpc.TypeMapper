syntax = "proto3";

option csharp_namespace = "Porticle.Grpc.UnitTests";

import "google/protobuf/wrappers.proto";


message TestMessage {
  string single_guid = 1;
  google.protobuf.StringValue single_nullable_guid = 2;
  google.protobuf.StringValue single_nullable_string = 4;
  repeated string list_of_guid = 5;
  string single_decimal = 8;
  google.protobuf.StringValue single_nullable_decimal = 9;
  repeated string list_of_decimal = 10;
}

message TestMessageMapped {
  // [GrpcGuid]
  string single_guid = 1;

  // [GrpcGuid]
  google.protobuf.StringValue single_nullable_guid = 2;

  // [NullableString]
  google.protobuf.StringValue single_nullable_string = 4;

  // [GrpcGuid]
  repeated string list_of_guid = 5;

  TestEnum enum_required = 6;

  // [NullableEnum]
  optional TestEnum enum_optional = 7;

  // [Decimal]
  string single_decimal = 8;

  // [Decimal]
  google.protobuf.StringValue single_nullable_decimal = 9;

  // [Decimal]
  repeated string list_of_decimal = 10;
}

//////////////////////////////////////////////
// Test comment to check marker comment 
//////////////////////////////////////////////
message TestMessageEnum1 {
  optional TestEnum enum_optional = 7;
}
message TestMessageEnum2 {
  // [NullableEnum]
  optional TestEnum enum_optional = 7;
}


message TestMessageEnum3 {
  
  optional TestEnum foo_bar = 7;
}


// [NullableReferenceTypes]
message TestMessageNullableRef {
  string required_string = 1;
  google.protobuf.StringValue nullable_string = 2;
  TestMessageEnum1 sub_message = 3;
  TestEnum enum_required = 4;
  optional TestEnum enum_optional = 5;
  int32 some_int = 6;
  int64 some_long = 7;
  uint32 some_uint = 8;
  uint64 some_ulong = 9;
  double some_double = 10;
  float some_float = 11;
  bool some_bool = 12;
  bytes some_bytes = 13;
  sint32 some_sint = 14;
  sint64 some_slong = 15;
  fixed32 some_fixed32 = 16;
  fixed64 some_fixed64 = 17;
  sfixed32 some_sfixed32 = 18;
  sfixed64 some_sfixed64 = 19;
  repeated string some_repeated_string = 20;
  map<string, string> some_map = 21;
}

message TestMessageNullableRefUnmapped {
  string required_string = 1;
  google.protobuf.StringValue nullable_string = 2;
  TestMessageEnum1 sub_message = 3;
}

enum TestEnum
{
  FOO = 0;
  BAR = 1;
}